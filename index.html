<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>あみだくじ抽選</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#101a2f;
      --text:#e6eefc;
      --muted:#9fb2d8;
      --accent:#7cc4ff;
      --accent2:#a78bfa;
      --win:#ffd166;
      --line:#3a4b72;
      --laneH: 28px;
      --glow-accent: rgba(124,196,255,.45);
      --glow-win: rgba(255,209,102,.5);
      --glass-bg: rgba(16,26,47,.55);
      --glass-border: rgba(255,255,255,.12);
      --glass-blur: 16px;
      --gradient-1: #7cc4ff;
      --gradient-2: #a78bfa;
      --gradient-3: #ffd166;
      --timing-smooth: cubic-bezier(.4,0,.2,1);
      --timing-bounce: cubic-bezier(.68,-.55,.27,1.55);
      --timing-decel: cubic-bezier(0,0,.2,1);
    }
    *{ box-sizing:border-box; }

    @keyframes pulse{
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.85; transform:scale(1.03); }
    }
    @keyframes shimmer{
      0%{ background-position:-200% center; }
      100%{ background-position:200% center; }
    }
    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }
    @keyframes fadeIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }
    @keyframes slideUp{
      from{ opacity:0; transform:translateY(16px); }
      to{ opacity:1; transform:translateY(0); }
    }
    @keyframes glowPulse{
      0%,100%{ box-shadow: 0 0 8px var(--glow-accent), 0 0 20px rgba(124,196,255,.15); }
      50%{ box-shadow: 0 0 16px var(--glow-accent), 0 0 40px rgba(124,196,255,.25); }
    }
    @keyframes gradientShift{
      0%{ background-position:0% 50%; }
      50%{ background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }
    @keyframes orbFloat1{
      0%,100%{ transform:translate(0,0) scale(1); }
      25%{ transform:translate(30px,-20px) scale(1.1); }
      50%{ transform:translate(-10px,-35px) scale(0.95); }
      75%{ transform:translate(-25px,10px) scale(1.05); }
    }
    @keyframes orbFloat2{
      0%,100%{ transform:translate(0,0) scale(1); }
      25%{ transform:translate(-20px,25px) scale(0.9); }
      50%{ transform:translate(25px,15px) scale(1.1); }
      75%{ transform:translate(10px,-20px) scale(0.95); }
    }
    @keyframes orbFloat3{
      0%,100%{ transform:translate(0,0) scale(1); }
      33%{ transform:translate(-15px,-30px) scale(1.05); }
      66%{ transform:translate(20px,10px) scale(0.9); }
    }
    @keyframes winPulse{
      0%,100%{ text-shadow: 0 0 6px rgba(255,209,102,.6); }
      50%{ text-shadow: 0 0 16px rgba(255,209,102,.9), 0 0 30px rgba(255,209,102,.4); }
    }
    @keyframes modalIn{
      from{ opacity:0; transform:scale(0.9) translateY(10px); }
      to{ opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes cardStagger{
      from{ opacity:0; transform:translateY(12px) scale(0.95); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes flashOverlay{
      0%{ opacity:.7; }
      100%{ opacity:0; }
    }
    @keyframes rippleEffect{
      0%{ transform:scale(0); opacity:.5; }
      100%{ transform:scale(4); opacity:0; }
    }
    @keyframes borderGlow{
      0%,100%{ border-color: rgba(124,196,255,.3); }
      50%{ border-color: rgba(124,196,255,.6); }
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #060b16 0%, var(--bg) 60%, #060b16 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-orbs{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }
    .bg-orbs .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      opacity:.15;
    }
    .bg-orbs .orb:nth-child(1){
      width:300px; height:300px;
      background: var(--gradient-1);
      top:20%; left:10%;
      animation: orbFloat1 18s ease-in-out infinite;
    }
    .bg-orbs .orb:nth-child(2){
      width:250px; height:250px;
      background: var(--gradient-2);
      top:60%; right:15%;
      animation: orbFloat2 22s ease-in-out infinite;
    }
    .bg-orbs .orb:nth-child(3){
      width:200px; height:200px;
      background: var(--gradient-3);
      bottom:20%; left:40%;
      animation: orbFloat3 15s ease-in-out infinite;
    }

    .btn{
      appearance:none; border:0; cursor:pointer;
      padding:10px 14px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(124,196,255,.18), rgba(167,139,250,.12));
      color: var(--text);
      border:1px solid rgba(124,196,255,.35);
      font-weight: 800;
      transition: transform .15s var(--timing-bounce), background .2s ease, opacity .15s ease, box-shadow .25s ease;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .btn::after{
      content:'';
      position:absolute;
      inset:0;
      background: radial-gradient(circle, rgba(255,255,255,.3) 0%, transparent 70%);
      opacity:0;
      transform:scale(0);
      transition: none;
      border-radius: inherit;
      pointer-events:none;
    }
    .btn:active::after{
      animation: rippleEffect .4s ease-out forwards;
    }
    .btn:hover:not(:disabled){
      transform: scale(1.05);
      box-shadow: 0 0 18px var(--glow-accent), 0 4px 20px rgba(0,0,0,.3);
      background: linear-gradient(135deg, rgba(124,196,255,.28), rgba(167,139,250,.2));
    }
    .btn:active:not(:disabled){ transform: scale(0.97); }
    .btn.secondary{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color: var(--muted);
      font-weight: 750;
    }
    .btn.secondary:hover:not(:disabled){
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 12px rgba(255,255,255,.1), 0 4px 16px rgba(0,0,0,.2);
    }
    .btn.success{
      background: linear-gradient(135deg, rgba(255,209,102,.18), rgba(255,150,50,.12));
      border:1px solid rgba(255,209,102,.35);
    }
    .btn.success:hover:not(:disabled){
      box-shadow: 0 0 20px var(--glow-win), 0 4px 20px rgba(0,0,0,.3);
      background: linear-gradient(135deg, rgba(255,209,102,.3), rgba(255,150,50,.2));
    }
    .btn:disabled{ opacity:.45; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

    /* ===== Input Screen ===== */
    .screen{
      min-height: 100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      position:relative;
      z-index:1;
      opacity:1;
      transform: translateY(0);
      transition: opacity .3s var(--timing-smooth), transform .3s var(--timing-smooth);
    }
    .screen.hiding{
      opacity:0;
      transform: translateY(-20px);
    }
    .card{
      width: min(860px, 96vw);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border:1px solid var(--glass-border);
      border-radius:18px;
      padding:18px;
      box-shadow: 0 10px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
      animation: fadeIn .5s var(--timing-decel) forwards;
    }
    h1{
      margin: 0 0 10px 0;
      font-size: 16px;
      letter-spacing: .02em;
    }
    .small{ font-size:12px; color: var(--muted); }
    textarea{
      width: 100%;
      height: min(55vh, 420px);
      resize: vertical;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(8,12,24,.65);
      color: var(--text);
      padding:12px;
      outline:none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.4;
      margin-top: 10px;
      transition: border-color .3s ease, box-shadow .3s ease;
    }
    textarea:focus{
      border-color: rgba(124,196,255,.5);
      box-shadow: 0 0 12px rgba(124,196,255,.2), 0 0 30px rgba(124,196,255,.08);
    }
    input[type="number"]{
      width: 80px;
      padding: 6px 10px;
      border-radius: 8px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(8,12,24,.65);
      color: var(--text);
      outline:none;
      font-size: 13px;
      font-weight: 700;
      transition: border-color .3s ease, box-shadow .3s ease;
    }
    input[type="number"]:focus{
      border-color: rgba(124,196,255,.5);
      box-shadow: 0 0 10px rgba(124,196,255,.2);
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: var(--muted);
      font-size:12px;
      transition: background .2s ease, transform .2s var(--timing-bounce);
    }
    .pill.updated{
      animation: pulse .4s ease;
    }
    .error{
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .error.show{
      display: block;
      animation: slideUp .3s var(--timing-decel);
    }

    /* ===== Lottery Screen (fullscreen) ===== */
    .full{
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #050a14 0%, #091225 55%, #050a14 100%);
      display:none;
      z-index: 10;
      opacity:0;
      transition: opacity .3s var(--timing-smooth);
    }
    .full.show{ display:block; opacity:1; }
    .full.entering{ display:block; opacity:0; }

    /* Ambient particles canvas for lottery screen */
    .ambientCanvas{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .topbar{
      position:absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 10px;
      z-index: 20;
      pointer-events:none;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .topbar .group{
      display:flex;
      gap:10px;
      pointer-events:auto;
    }
    .topbar .title{
      font-weight: 900;
      letter-spacing: .02em;
      color: rgba(230,238,252,.92);
      font-size: 28px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.10);
      pointer-events:auto;
      max-width: 70vw;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stageWrap{
      position:absolute;
      inset: 0;
      overflow: auto;
      padding: 72px 12px 12px;
      z-index:1;
    }
    .stage{
      position: relative;
      width: max-content;
      padding: 14px;
      min-height: calc(100% - 14px);
    }
    canvas{
      display:block;
      border-radius: 14px;
      background: rgba(6,9,18,.45);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 4px 30px rgba(0,0,0,.2);
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:5;
    }
    .overlay .msg{
      padding:12px 18px;
      border-radius: 999px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border:1px solid var(--glass-border);
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .03em;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .3s var(--timing-decel), transform .3s var(--timing-decel);
      max-width: 92vw;
      text-align:center;
      text-shadow: 0 0 8px rgba(124,196,255,.3);
    }
    .overlay.show .msg{ opacity: 1; transform: translateY(0); }

    /* centered reveal button */
    .centerAction{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index: 25;
      pointer-events:none;
    }
    .centerAction .btn{
      pointer-events:auto;
      padding: 16px 22px;
      font-size: 17px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35), 0 0 25px var(--glow-win);
      animation: glowPulse 2s ease-in-out infinite;
    }
    .centerAction.hidden{ display:none; }

    /* Screen flash for winner reveal */
    .screenFlash{
      position:fixed;
      inset:0;
      background: rgba(255,255,255,.7);
      z-index:28;
      pointer-events:none;
      opacity:0;
      display:none;
    }
    .screenFlash.active{
      display:block;
      animation: flashOverlay .4s ease-out forwards;
    }

    /* Accessibility: reduce motion for photosensitive users */
    @media (prefers-reduced-motion: reduce) {
      .screenFlash.active {
        display: none;
        animation: none;
      }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* results modal */
    .modal{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 30;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .modal.show{ display:flex; }
    .modalCard{
      width: min(560px, 92vw);
      border-radius: 18px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      box-shadow: 0 18px 55px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
      padding: 18px;
      animation: modalIn .35s var(--timing-decel) forwards;
    }
    .modalCard h2{
      margin:0 0 10px 0;
      font-size: 24px;
      letter-spacing:.02em;
      background: linear-gradient(90deg, var(--gradient-3), var(--gradient-1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .winners{
      display:flex;
      flex-wrap: wrap;
      gap:10px;
      margin: 10px 0 14px;
    }
    .winner{
      padding:14px 18px;
      border-radius: 16px;
      background: rgba(255,209,102,.1);
      border:1px solid rgba(255,209,102,.3);
      color: var(--text);
      font-weight: 900;
      letter-spacing: .02em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 30px;
      line-height: 1.3;
      word-break: break-all;
      opacity:0;
      animation: cardStagger .4s var(--timing-decel) forwards;
      box-shadow: 0 0 15px rgba(255,209,102,.1);
      text-shadow: 0 0 8px rgba(255,209,102,.3);
    }
  </style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- ===== Input Screen ===== -->
<section class="screen" id="inputScreen">
  <div class="card">
    <h1>参加者を貼り付け</h1>
    <textarea id="bulkInput" placeholder="例:
alice
bob_smith
maeda-kazutoshi"></textarea>
    <div class="row">
      <button class="btn" id="toLotteryBtn">抽選へ</button>
      <button class="btn secondary" id="clearBtn">クリア</button>
      <span class="pill" id="countPill"><span id="count">0</span> 名</span>
      <span class="pill">当選: <input type="number" id="winCount" value="5" min="1" step="1"> 名</span>
    </div>
    <div class="error" id="errorMsg"></div>
  </div>
</section>

<!-- ===== Lottery Screen (fullscreen) ===== -->
<section class="full" id="lotteryScreen" aria-hidden="true">
  <canvas class="ambientCanvas" id="ambientCv"></canvas>
  <div class="topbar">
    <div class="group">
      <button class="btn" id="startBtn">スタート</button>
      <button class="btn secondary" id="shuffleBtn">レーン再生成</button>
    </div>
    <div class="title" id="metaTitle">あみだくじ</div>
    <div class="group">
      <button class="btn secondary" id="backBtn">戻る</button>
    </div>
  </div>

  <div class="stageWrap" id="stageWrap">
    <div class="stage">
      <canvas id="cv"></canvas>
      <canvas id="particleCv" style="position:absolute;top:14px;left:14px;pointer-events:none;z-index:2;"></canvas>
      <div class="overlay" id="overlay"><div class="msg" id="overlayMsg">準備中…</div></div>
      <div class="centerAction hidden" id="centerAction">
        <button class="btn success" id="revealBtn">結果発表</button>
      </div>
      <div class="modal" id="resultModal">
        <div class="modalCard">
          <h2>当選者</h2>
          <div class="winners" id="winners"></div>
          <div class="row" style="justify-content:flex-end; margin:0;">
            <button class="btn secondary" id="closeModalBtn">閉じる</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="screenFlash" id="screenFlash"></div>
</section>

<script>
(() => {
  // ===== Particle System =====
  class Particle {
    constructor(x, y, opts = {}) {
      this.x = x;
      this.y = y;
      this.vx = opts.vx || (Math.random() - 0.5) * 4;
      this.vy = opts.vy || (Math.random() - 0.5) * 4;
      this.life = opts.life || 1;
      this.maxLife = this.life;
      this.size = opts.size || 2 + Math.random() * 3;
      this.color = opts.color || 'rgba(255,209,102,1)';
      this.gravity = opts.gravity || 0.05;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.life -= 0.016;
    }
    draw(ctx) {
      if (this.life <= 0) return;
      const alpha = Math.max(0, this.life / this.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.life <= 0; }
  }

  class ParticleSystem {
    constructor() {
      this.particles = [];
    }
    add(p) { this.particles.push(p); }
    update() {
      for (let i = this.particles.length - 1; i >= 0; i--) {
        this.particles[i].update();
        if (this.particles[i].dead) this.particles.splice(i, 1);
      }
    }
    draw(ctx) {
      for (const p of this.particles) p.draw(ctx);
    }
    spawnTrail(x, y) {
      if (this.particles.length >= 200) return;
      const colors = ['rgba(255,209,102,1)', 'rgba(255,180,50,1)', 'rgba(255,230,150,1)'];
      for (let i = 0; i < 2; i++) {
        this.add(new Particle(x, y, {
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2 - 1,
          life: 0.4 + Math.random() * 0.3,
          size: 1.5 + Math.random() * 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          gravity: 0.02
        }));
      }
    }
    spawnExplosion(x, y, count = 60) {
      const colors = [
        'rgba(255,209,102,1)', 'rgba(255,150,50,1)',
        'rgba(255,255,255,1)', 'rgba(124,196,255,1)',
        'rgba(167,139,250,1)'
      ];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        this.add(new Particle(x, y, {
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 0.8 + Math.random() * 0.8,
          size: 2 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          gravity: 0.08
        }));
      }
    }
    get count() { return this.particles.length; }
  }

  // ===== Ambient Particles =====
  class AmbientParticle {
    constructor(w, h) {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.size = 1 + Math.random() * 2;
      this.alpha = 0.1 + Math.random() * 0.3;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = -0.2 - Math.random() * 0.3;
      this.w = w;
      this.h = h;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.y < -10) { this.y = this.h + 10; this.x = Math.random() * this.w; }
      if (this.x < -10) this.x = this.w + 10;
      if (this.x > this.w + 10) this.x = -10;
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = '#7cc4ff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  const particleSystem = new ParticleSystem();
  let ambientParticles = [];
  let ambientRunning = false;
  let ambientRafId = null;

  // ===== state =====
  const state = {
    members: [],
    winners: [],
    pendingWinners: [],
    revealed: false,
    showWinnersOnBoard: false,
    lanes: [],
    connectors: [],
    running: false,
    laneH: parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--laneH')) || 28,
  };

  // ===== elements =====
  const inputScreen = document.getElementById('inputScreen');
  const lotteryScreen = document.getElementById('lotteryScreen');
  const bulkInput = document.getElementById('bulkInput');
  const toLotteryBtn = document.getElementById('toLotteryBtn');
  const clearBtn = document.getElementById('clearBtn');
  const countEl = document.getElementById('count');
  const countPill = document.getElementById('countPill');
  const startBtn = document.getElementById('startBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const backBtn = document.getElementById('backBtn');
  const stageWrap = document.getElementById('stageWrap');
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const centerAction = document.getElementById('centerAction');
  const revealBtn = document.getElementById('revealBtn');
  const resultModal = document.getElementById('resultModal');
  const winnersEl = document.getElementById('winners');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const metaTitle = document.getElementById('metaTitle');
  const winCountInput = document.getElementById('winCount');
  const errorMsg = document.getElementById('errorMsg');
  const screenFlash = document.getElementById('screenFlash');
  const ambientCv = document.getElementById('ambientCv');
  const ambientCtx = ambientCv.getContext('2d');
  const particleCv = document.getElementById('particleCv');
  const particleCtx = particleCv.getContext('2d');

  // ===== config =====
  let WINNERS_N = 5;
  const leftPad = 220;
  const topPad = 24;
  const rightPad = 110;
  const minW = 880;
  const stepX = 140;
  const cols = 9;
  const barChance = 0.35;
  const barMinGap = 1;
  const scrollPreviewMs = 1600;
  const scrollEdgePad = 30;

  // ===== helpers =====
  const uniq = (arr) => Array.from(new Set(arr));
  const clamp = (x, a, b) => Math.max(a, Math.min(b, x));

  function setOverlay(text, show=true){
    overlayMsg.textContent = text;
    overlay.classList.toggle('show', show);
  }
  function showCenterReveal(show){
    centerAction.classList.toggle('hidden', !show);
    revealBtn.disabled = !show;
  }
  function showModal(show){
    resultModal.classList.toggle('show', show);
  }

  function parseMembersFromTextarea(){
    const raw = bulkInput.value || '';
    const lines = raw.split(/\r\n|\n|\r/).map(s => s.trim()).filter(Boolean);
    return uniq(lines);
  }

  function updateCount(){
    const prev = countEl.textContent;
    state.members = parseMembersFromTextarea();
    countEl.textContent = state.members.length;
    if (prev !== String(state.members.length)) {
      countPill.classList.remove('updated');
      void countPill.offsetWidth;
      countPill.classList.add('updated');
    }
    errorMsg.classList.remove('show');
    errorMsg.textContent = '';
  }

  function resetRun(){
    state.winners = [];
    state.pendingWinners = [];
    state.revealed = false;
    state.showWinnersOnBoard = false;
    setWinnersUI([]);
    showCenterReveal(false);
    showModal(false);
    renderBoard();
  }

  // ===== Ambient particle system =====
  function initAmbient() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    ambientCv.width = w * devicePixelRatio;
    ambientCv.height = h * devicePixelRatio;
    ambientCv.style.width = w + 'px';
    ambientCv.style.height = h + 'px';
    ambientCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    ambientParticles = [];
    for (let i = 0; i < 25; i++) {
      ambientParticles.push(new AmbientParticle(w, h));
    }
  }

  function runAmbient() {
    if (!ambientRunning) return;
    const w = parseInt(ambientCv.style.width);
    const h = parseInt(ambientCv.style.height);
    ambientCtx.clearRect(0, 0, w, h);
    for (const p of ambientParticles) {
      p.update();
      p.draw(ambientCtx);
    }
    ambientRafId = requestAnimationFrame(runAmbient);
  }

  function startAmbient() {
    if (ambientRunning) return;
    ambientRunning = true;
    initAmbient();
    runAmbient();
  }
  function stopAmbient() {
    ambientRunning = false;
    if (ambientRafId !== null) {
      cancelAnimationFrame(ambientRafId);
      ambientRafId = null;
    }
  }

  // ===== screen switching =====
  function enterLottery(){
    state.members = parseMembersFromTextarea();
    updateCount();
    if(state.members.length === 0) return;

    const inputVal = parseInt(winCountInput.value, 10);
    WINNERS_N = isNaN(inputVal) || inputVal < 1 ? 1 : inputVal;

    if(state.members.length < WINNERS_N){
      errorMsg.textContent = `参加人数が少なすぎます。（参加者 ${state.members.length} 名 < 当選 ${WINNERS_N} 名）`;
      errorMsg.classList.add('show');
      return;
    }

    errorMsg.classList.remove('show');
    errorMsg.textContent = '';

    // Animated transition
    inputScreen.classList.add('hiding');
    let transitionHandled = false;
    function onTransitionDone() {
      if (transitionHandled) return;
      transitionHandled = true;
      inputScreen.removeEventListener('transitionend', onTransitionDone);
      inputScreen.style.display = 'none';
      inputScreen.classList.remove('hiding');
      lotteryScreen.classList.add('entering');
      lotteryScreen.classList.add('show');
      lotteryScreen.setAttribute('aria-hidden', 'false');
      // Force reflow then animate in
      void lotteryScreen.offsetWidth;
      lotteryScreen.classList.remove('entering');

      metaTitle.textContent = `あみだくじ（参加者 ${state.members.length} 名 / 当選 ${WINNERS_N} 名）`;
      resetRun();
      rebuildBoard();
      stageWrap.scrollLeft = 0;
      startAmbient();
    }
    inputScreen.addEventListener('transitionend', onTransitionDone, { once: true });
    // Fallback for cases where transitionend may not fire (e.g., reduced-motion)
    setTimeout(onTransitionDone, 400);
  }

  function backToInput(){
    stopAmbient();
    lotteryScreen.classList.remove('show');
    lotteryScreen.setAttribute('aria-hidden', 'true');
    inputScreen.style.display = 'flex';
    inputScreen.style.opacity = '0';
    inputScreen.style.transform = 'translateY(20px)';
    void inputScreen.offsetWidth;
    inputScreen.style.opacity = '';
    inputScreen.style.transform = '';
    showModal(false);
    showCenterReveal(false);
    setOverlay('', false);
  }

  // ===== geometry & generation =====
  function canvasSize(){
    const n = Math.max(1, state.members.length);
    const h = topPad * 2 + n * state.laneH;
    const w = Math.max(minW, leftPad + rightPad + cols * stepX);
    cv.width = Math.floor(w * devicePixelRatio);
    cv.height = Math.floor(h * devicePixelRatio);
    cv.style.width = w + 'px';
    cv.style.height = h + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    // Size particle overlay canvas to match
    particleCv.width = Math.floor(w * devicePixelRatio);
    particleCv.height = Math.floor(h * devicePixelRatio);
    particleCv.style.width = w + 'px';
    particleCv.style.height = h + 'px';
    particleCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  function buildLanes(){
    const n = Math.max(1, state.members.length);
    state.lanes = Array.from({length:n}, (_,i) => topPad + i * state.laneH + state.laneH/2);
  }

  function buildConnectors(){
    const n = state.members.length;
    state.connectors = [];
    if(n < 2) return;
    const xs = [];
    for(let c=1;c<cols;c++) xs.push(leftPad + c * stepX);
    xs.forEach(x => {
      let last = -999;
      for(let i=0;i<n-1;i++){
        if(i - last <= barMinGap) continue;
        if(Math.random() < barChance){
          state.connectors.push({x, i});
          last = i;
          i++;
        }
      }
    });
    if(state.connectors.length === 0){
      const x = xs[Math.floor(xs.length/2)] || (leftPad + stepX);
      const i = Math.floor((n-1)/2);
      state.connectors.push({x, i: clamp(i,0,n-2)});
    }
  }

  function rebuildBoard(){
    canvasSize();
    buildLanes();
    buildConnectors();
    renderBoard();
  }

  // ===== rendering =====
  function drawText(text, x, y, align='left', bold=false, color='rgba(230,238,252,.95)'){
    ctx.save();
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.font = `${bold ? 800 : 650} 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function renderBoard(highlightPath=null){
    const w = parseFloat(cv.style.width);
    const h = parseFloat(cv.style.height);
    ctx.clearRect(0,0,w,h);

    const winnersSet = state.showWinnersOnBoard ? new Set(state.winners) : null;

    // lanes with subtle glow
    ctx.save();
    state.lanes.forEach((y,i) => {
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(58,75,114,.55)';
      ctx.shadowBlur = 3;
      ctx.shadowColor = 'rgba(124,196,255,.1)';
      ctx.beginPath();
      ctx.moveTo(leftPad, y);
      ctx.lineTo(w - rightPad, y);
      ctx.stroke();
      ctx.shadowBlur = 0;

      const name = state.members[i] ?? '(no member)';
      drawText(name, leftPad - 10, y, 'right', true, 'rgba(230,238,252,.92)');

      const isWin = winnersSet && winnersSet.has(name);
      if (isWin) {
        // Draw pulsing WIN text
        const time = performance.now() / 1000;
        const glowIntensity = 6 + Math.sin(time * 3) * 4;
        ctx.save();
        ctx.shadowBlur = glowIntensity;
        ctx.shadowColor = 'rgba(255,209,102,.8)';
        drawText('\u2605 WIN', w - rightPad + 18, y, 'left', true, 'rgba(255,209,102,.95)');
        ctx.restore();
      } else {
        drawText('\u2192', w - rightPad + 18, y, 'left', true, 'rgba(159,178,216,.9)');
      }
    });
    ctx.restore();

    // connectors with glow
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(124,196,255,.40)';
    ctx.shadowBlur = 4;
    ctx.shadowColor = 'rgba(124,196,255,.2)';
    state.connectors.forEach(({x,i}) => {
      const y1 = state.lanes[i];
      const y2 = state.lanes[i+1];
      ctx.beginPath();
      ctx.moveTo(x, y1);
      ctx.lineTo(x, y2);
      ctx.stroke();
    });
    ctx.restore();

    // highlight path with glow
    if(highlightPath){
      ctx.save();
      ctx.lineWidth = 3.5;
      ctx.strokeStyle = 'rgba(255,209,102,.95)';
      ctx.shadowBlur = 12;
      ctx.shadowColor = 'rgba(255,209,102,.7)';
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      const pts = highlightPath.points;
      if(pts.length){
        ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();
      ctx.restore();

      // Draw trail dots
      if (highlightPath.trail) {
        for (const t of highlightPath.trail) {
          ctx.save();
          ctx.globalAlpha = t.alpha;
          ctx.fillStyle = 'rgba(255,209,102,.8)';
          ctx.shadowBlur = 4;
          ctx.shadowColor = 'rgba(255,209,102,.5)';
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Glowing cursor ball
      const p = highlightPath.cursor;
      if(p){
        ctx.save();
        ctx.shadowBlur = 16;
        ctx.shadowColor = 'rgba(255,209,102,.9)';
        ctx.fillStyle = 'rgba(255,209,102,.95)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI*2);
        ctx.fill();
        // outer glow ring
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 11, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw particle system on overlay canvas
    const pw = parseFloat(particleCv.style.width);
    const ph = parseFloat(particleCv.style.height);
    particleCtx.clearRect(0, 0, pw, ph);
    particleSystem.draw(particleCtx);
  }

  // ===== mapping =====
  function computePath(startI){
    const w = parseFloat(cv.style.width);
    const startX = leftPad;
    const endX = w - rightPad;

    const byX = new Map();
    state.connectors.forEach(c => {
      if(!byX.has(c.x)) byX.set(c.x, []);
      byX.get(c.x).push(c);
    });
    for(const arr of byX.values()) arr.sort((a,b) => a.i - b.i);
    const xs = Array.from(byX.keys()).sort((a,b)=>a-b);

    let i = startI;
    let y = state.lanes[i];
    const points = [{x:startX, y}];

    for(const x of xs){
      points.push({x, y});
      const arr = byX.get(x);
      let moved = false;
      const down = arr.find(c => c.i === i);
      if(down){
        points.push({x, y: state.lanes[i+1]});
        i = i+1;
        y = state.lanes[i];
        moved = true;
      } else {
        const up = arr.find(c => c.i === i-1);
        if(up){
          points.push({x, y: state.lanes[i-1]});
          i = i-1;
          y = state.lanes[i];
          moved = true;
        }
      }
      if(moved) points.push({x, y});
    }
    points.push({x:endX, y});
    return {endIndex: i, points};
  }

  // ===== animation =====
  function easeInOut(t){
    return t<.5 ? 2*t*t : 1- Math.pow(-2*t+2,2)/2;
  }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
  function animateMs(ms, fn){
    return new Promise(resolve => {
      const start = performance.now();
      const tick = (now) => {
        const t = clamp((now-start)/ms, 0, 1);
        fn(t);
        if(t < 1) requestAnimationFrame(tick);
        else resolve();
      };
      requestAnimationFrame(tick);
    });
  }

  async function autoPreviewScroll(){
    const maxScroll = stageWrap.scrollWidth - stageWrap.clientWidth;
    if(maxScroll <= 2) return;

    setOverlay('全体を表示中…', true);
    stageWrap.scrollLeft = 0;
    await sleep(120);

    await animateMs(scrollPreviewMs * 0.55, (t) => {
      stageWrap.scrollLeft = maxScroll * easeInOut(t);
    });

    await sleep(120);

    await animateMs(scrollPreviewMs * 0.45, (t) => {
      stageWrap.scrollLeft = maxScroll * (1 - easeInOut(t));
      stageWrap.scrollLeft = clamp(stageWrap.scrollLeft, 0, maxScroll);
    });

    setOverlay('', false);
  }

  function keepCursorVisible(canvasX){
    const contentX = cv.offsetLeft + canvasX;
    const viewL = stageWrap.scrollLeft;
    const viewR = viewL + stageWrap.clientWidth;
    const margin = scrollEdgePad;

    if(contentX < viewL + margin){
      stageWrap.scrollLeft = clamp(contentX - margin, 0, stageWrap.scrollWidth - stageWrap.clientWidth);
    } else if(contentX > viewR - margin){
      stageWrap.scrollLeft = clamp(contentX - stageWrap.clientWidth + margin, 0, stageWrap.scrollWidth - stageWrap.clientWidth);
    }
  }

  async function animatePath(path, ms=1200){
    return new Promise((resolve) => {
      const pts = path.points;
      const segs = [];
      let total = 0;
      for(let i=0;i<pts.length-1;i++){
        const a = pts[i], b = pts[i+1];
        const len = Math.hypot(b.x-a.x, b.y-a.y);
        segs.push({a,b,len});
        total += len;
      }

      const trail = [];
      const maxTrail = 12;
      let lastTrailTime = 0;
      const start = performance.now();

      function step(now){
        const t = clamp((now - start)/ms, 0, 1);
        // Accelerate-decelerate easing
        const tt = easeInOut(t);
        let d = total * tt;

        let cursor = pts[0];
        const drawn = [pts[0]];

        for(const s of segs){
          if(d <= s.len){
            const r = s.len === 0 ? 0 : d / s.len;
            cursor = {x: s.a.x + (s.b.x-s.a.x)*r, y: s.a.y + (s.b.y-s.a.y)*r};
            drawn.push(cursor);
            break;
          } else {
            drawn.push(s.b);
            d -= s.len;
          }
        }

        // Add trail points
        if (now - lastTrailTime > 30) {
          trail.push({ x: cursor.x, y: cursor.y, alpha: 0.7, size: 3 });
          if (trail.length > maxTrail) trail.shift();
          lastTrailTime = now;
        }
        // Fade trail
        for (const tr of trail) {
          tr.alpha *= 0.92;
          tr.size *= 0.97;
        }

        // Spawn particle trail
        particleSystem.spawnTrail(cursor.x, cursor.y);
        particleSystem.update();

        keepCursorVisible(cursor.x);
        renderBoard({points: drawn, cursor, trail});

        if(t < 1) requestAnimationFrame(step);
        else resolve(true);
      }

      requestAnimationFrame(step);
    });
  }

  // ===== sound =====
  function playFanfare(){
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!AudioContext) return;

    const ac = new AudioContext();
    const now = ac.currentTime;

    const master = ac.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
    master.connect(ac.destination);

    const notes = [
      {t:0.00, f:523.25, d:0.16},
      {t:0.18, f:659.25, d:0.16},
      {t:0.36, f:783.99, d:0.18},
      {t:0.58, f:1046.50, d:0.35},
    ];

    for(const n of notes){
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(n.f, now + n.t);
      g.gain.setValueAtTime(0.0001, now + n.t);
      g.gain.exponentialRampToValueAtTime(0.35, now + n.t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + n.t + n.d);
      o.connect(g); g.connect(master);
      o.start(now + n.t);
      o.stop(now + n.t + n.d + 0.03);
    }
    setTimeout(() => ac.close().catch(()=>{}), 1600);
  }

  // ===== winners UI =====
  function setWinnersUI(winners){
    winnersEl.innerHTML = '';
    for(let idx = 0; idx < winners.length; idx++){
      const d = document.createElement('div');
      d.className = 'winner';
      d.textContent = winners[idx];
      d.style.animationDelay = (idx * 100) + 'ms';
      winnersEl.appendChild(d);
    }
  }

  function pickWinners(){
    const m = [...state.members];
    for(let i=m.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [m[i],m[j]] = [m[j],m[i]];
    }
    return m.slice(0, Math.min(WINNERS_N, m.length));
  }

  // ===== main actions =====
  async function startLottery(){
    if(state.running) return;
    if(state.members.length === 0) return;

    resetRun();

    state.running = true;
    startBtn.disabled = true;
    shuffleBtn.disabled = true;
    backBtn.disabled = true;

    state.pendingWinners = pickWinners();

    rebuildBoard();
    await autoPreviewScroll();

    setOverlay('抽選中…', true);

    const startIndices = state.pendingWinners.map(name => state.members.indexOf(name));

    for(let k=0;k<startIndices.length;k++){
      const startI = startIndices[k];
      if(startI === -1) continue;
      const path = computePath(startI);
      await animatePath(path, 1200);
      renderBoard();
      await sleep(140);
    }

    setOverlay('', false);
    renderBoard();

    state.running = false;
    startBtn.disabled = false;
    shuffleBtn.disabled = false;
    backBtn.disabled = false;

    showCenterReveal(true);
    setOverlay('準備OK：結果発表を押してください', true);
    setTimeout(()=> setOverlay('', false), 900);
  }

  function revealResults(){
    if(state.revealed) return;
    if(state.pendingWinners.length === 0) return;

    state.winners = [...state.pendingWinners];
    state.pendingWinners = [];
    state.revealed = true;

    // Screen flash effect
    screenFlash.classList.add('active');
    setTimeout(() => screenFlash.classList.remove('active'), 450);

    // Particle explosion in center of canvas
    const cvW = parseFloat(cv.style.width);
    const cvH = parseFloat(cv.style.height);
    particleSystem.spawnExplosion(cvW / 2, cvH / 2, 80);

    // Animate particles on overlay canvas only (avoids full board redraw)
    let frames = 0;
    function particleBurst() {
      particleSystem.update();
      const pw = parseFloat(particleCv.style.width);
      const ph = parseFloat(particleCv.style.height);
      particleCtx.clearRect(0, 0, pw, ph);
      particleSystem.draw(particleCtx);
      frames++;
      if (frames < 60) requestAnimationFrame(particleBurst);
    }
    particleBurst();

    state.showWinnersOnBoard = true;
    renderBoard();
    setWinnersUI(state.winners);
    showCenterReveal(false);

    // Delay modal slightly for flash + particles to show
    setTimeout(() => {
      showModal(true);
      playFanfare();
    }, 350);
  }

  // ===== events =====
  toLotteryBtn.addEventListener('click', enterLottery);
  clearBtn.addEventListener('click', () => {
    bulkInput.value = '';
    state.members = [];
    updateCount();
  });

  bulkInput.addEventListener('input', () => {
    state.members = parseMembersFromTextarea();
    updateCount();
  });
  winCountInput.addEventListener('input', () => {
    errorMsg.classList.remove('show');
    errorMsg.textContent = '';
  });

  backBtn.addEventListener('click', backToInput);

  shuffleBtn.addEventListener('click', () => {
    if(state.running) return;
    resetRun();
    rebuildBoard();
  });

  startBtn.addEventListener('click', startLottery);
  revealBtn.addEventListener('click', revealResults);

  closeModalBtn.addEventListener('click', () => showModal(false));
  resultModal.addEventListener('click', (e) => {
    if(e.target === resultModal) showModal(false);
  });

  window.addEventListener('resize', () => {
    if(!lotteryScreen.classList.contains('show')) return;
    rebuildBoard();
    initAmbient();
  });

  // init count
  updateCount();
})();
</script>
</body>
</html>
